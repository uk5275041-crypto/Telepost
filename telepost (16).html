<meta charset="UTF-8">
<style>
  :root{
    --bg:#0B0F17;
    --surface:#121826;
    --surface-2:#1A2233;
    --border:#232B3D;
    --text:#E7ECF6;
    --muted:#8793AD;
    --accent:#00D1B2;
    --accent-dim:#0A3B34;
    --gold:#E8A33D;
    --gold-dim:#4A3316;
    --danger:#EF5A6F;
    --radius:14px;
    font-family:'Inter',system-ui,sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);}
  #tp-root{width:100%;min-height:600px;background:var(--bg);display:flex;flex-direction:column;color:var(--text);}

  .tp-display{font-family:'Sora',sans-serif;}

  /* ---------- Auth screen ---------- */
  .tp-auth{
    min-height:600px;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(circle at 20% 15%, rgba(0,209,178,0.12), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(232,163,61,0.10), transparent 40%),
      var(--bg);
    padding:32px 16px;
  }
  .tp-auth-card{
    width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .tp-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .tp-logo-mark{
    width:38px;height:38px;border-radius:11px;
    background:linear-gradient(135deg,var(--accent),#0A8F7A);
    display:flex;align-items:center;justify-content:center;
    font-family:'Sora',sans-serif;font-weight:800;color:#04211C;font-size:18px;flex-shrink:0;
  }
  .tp-logo-text{font-family:'Sora',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.02em;}
  .tp-auth-sub{color:var(--muted);font-size:13.5px;margin:6px 0 24px;line-height:1.5;}
  .tp-tabs{display:flex;background:var(--surface-2);border-radius:10px;padding:4px;margin-bottom:20px;}
  .tp-tab-btn{
    flex:1;text-align:center;padding:9px 0;border:none;background:transparent;color:var(--muted);
    font-weight:600;font-size:13.5px;border-radius:8px;cursor:pointer;transition:all .15s ease;font-family:inherit;
  }
  .tp-tab-btn.active{background:var(--accent);color:#04211C;}
  .tp-field{margin-bottom:14px;}
  .tp-field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:500;}
  .tp-field input{
    width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    padding:11px 13px;color:var(--text);font-size:14.5px;font-family:inherit;outline:none;transition:border-color .15s;
  }
  .tp-field input:focus{border-color:var(--accent);}
  .tp-btn-primary{
    width:100%;background:var(--accent);color:#04211C;border:none;border-radius:10px;
    padding:12px 0;font-weight:700;font-size:14.5px;cursor:pointer;margin-top:6px;font-family:inherit;
    transition:filter .15s;
  }
  .tp-btn-primary:hover{filter:brightness(1.08);}
  .tp-btn-primary:disabled{opacity:0.55;cursor:default;}
  .tp-btn-secondary{
    width:100%;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:10px;
    padding:11px 0;font-weight:600;font-size:13.5px;cursor:pointer;margin-top:8px;font-family:inherit;
  }
  .tp-error{color:var(--danger);font-size:12.5px;margin-top:10px;min-height:16px;}
  .tp-success{color:var(--accent);font-size:12.5px;margin-top:10px;min-height:16px;}
  .tp-hint{color:var(--muted);font-size:12px;margin-top:16px;text-align:center;line-height:1.6;}

  /* ---------- App shell ---------- */
  .tp-app{display:flex;flex-direction:column;min-height:600px;}
  .tp-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);
    position:sticky;top:0;z-index:5;
  }
  .tp-header-left{display:flex;align-items:center;gap:10px;}
  .tp-wallet{
    display:flex;align-items:center;gap:6px;background:var(--gold-dim);color:var(--gold);
    padding:6px 12px;border-radius:20px;font-weight:700;font-size:13px;
  }
  .tp-header-right{display:flex;align-items:center;gap:10px;}
  .tp-icon-btn{
    background:var(--surface-2);border:1px solid var(--border);color:var(--muted);
    border-radius:9px;padding:7px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;
  }
  .tp-icon-btn:hover{color:var(--text);}

  .tp-navbar{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);}
  .tp-nav-btn{
    padding:8px 16px;border-radius:9px;border:none;background:transparent;color:var(--muted);
    font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;
  }
  .tp-nav-btn.active{background:var(--surface-2);color:var(--accent);}

  .tp-body{flex:1;display:flex;min-height:0;}

  /* ---------- Chats ---------- */
  .tp-chat-list{width:240px;border-right:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;}
  .tp-chat-item{
    display:flex;gap:10px;align-items:center;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);
  }
  .tp-chat-item:hover, .tp-chat-item.active{background:var(--surface-2);}
  .tp-avatar{
    width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#3B4A66,#1A2233);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;
  }
  .tp-chat-name{font-weight:600;font-size:13.5px;}
  .tp-chat-preview{color:var(--muted);font-size:12px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px;}
  .tp-chat-window{flex:1;display:flex;flex-direction:column;min-width:0;}
  .tp-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}
  .tp-msg{max-width:65%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.45;}
  .tp-msg.me{align-self:flex-end;background:var(--accent);color:#04211C;border-bottom-right-radius:4px;}
  .tp-msg.them{align-self:flex-start;background:var(--surface-2);border-bottom-left-radius:4px;}
  .tp-composer{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--border);}
  .tp-composer input{
    flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    padding:10px 13px;color:var(--text);font-family:inherit;font-size:13.5px;outline:none;
  }
  .tp-send-btn{background:var(--accent);color:#04211C;border:none;border-radius:10px;padding:0 18px;font-weight:700;cursor:pointer;font-family:inherit;}

  .tp-addfriend{padding:12px;border-bottom:1px solid var(--border);}
  .tp-addfriend-row{display:flex;gap:6px;}
  .tp-addfriend input{
    flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
    padding:8px 10px;color:var(--text);font-family:inherit;font-size:12.5px;outline:none;min-width:0;
  }
  .tp-addfriend button{
    background:var(--accent);color:#04211C;border:none;border-radius:8px;padding:0 12px;
    font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .tp-addfriend-msg{font-size:11px;color:var(--muted);margin-top:6px;min-height:14px;}
  .tp-section-label{padding:10px 14px 4px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}

  /* ---------- Premium feed ---------- */
  .tp-feed{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:16px;align-items:center;}
  .tp-post{width:100%;max-width:560px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;position:relative;}
  .tp-post-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .tp-post-author{font-weight:700;font-size:13.5px;}
  .tp-post-meta{color:var(--muted);font-size:11.5px;}
  .tp-post-text{font-size:14px;line-height:1.55;color:var(--text);}
  .tp-post-text.locked{filter:blur(5px);user-select:none;}
  .tp-badge-premium{
    position:absolute;top:14px;right:16px;display:flex;align-items:center;gap:5px;
    background:var(--gold-dim);color:var(--gold);padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;
  }
  .tp-unlock-bar{
    margin-top:12px;display:flex;align-items:center;justify-content:space-between;
    background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;
  }
  .tp-unlock-text{font-size:12.5px;color:var(--muted);}
  .tp-unlock-btn{
    background:var(--gold);color:#2B1B04;border:none;border-radius:8px;padding:8px 14px;font-weight:700;
    font-size:12.5px;cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .tp-unlock-btn:disabled{opacity:.5;cursor:default;}
  .tp-unlocked-tag{color:var(--accent);font-size:11.5px;font-weight:700;margin-top:10px;}

  .tp-composer-panel{width:100%;max-width:560px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;}
  .tp-composer-panel textarea{
    width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    padding:11px 13px;color:var(--text);font-size:13.5px;font-family:inherit;outline:none;resize:vertical;min-height:70px;
  }
  .tp-composer-row{display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap;}
  .tp-composer-check{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer;}
  .tp-composer-price{display:flex;align-items:center;gap:6px;}
  .tp-composer-price input{
    width:90px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
    padding:7px 9px;color:var(--text);font-family:inherit;font-size:12.5px;outline:none;
  }
  .tp-new-post-toggle{
    width:100%;max-width:560px;background:var(--surface);border:1px dashed var(--border);border-radius:16px;
    padding:14px 18px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;text-align:center;
  }
  .tp-new-post-toggle:hover{color:var(--text);border-color:var(--accent);}

  /* ---------- Profile ---------- */
  .tp-profile{flex:1;overflow-y:auto;padding:28px;display:flex;justify-content:center;}
  .tp-profile-card{width:100%;max-width:420px;}
  .tp-profile-head{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
  .tp-profile-avatar{
    width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#0A8F7A);
    display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;
  }
  .tp-profile-name{font-weight:800;font-size:18px;font-family:'Sora',sans-serif;}
  .tp-profile-balance{color:var(--gold);font-size:13px;font-weight:600;margin-top:3px;}
  .tp-emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
  .tp-emoji-btn{
    width:40px;height:40px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .tp-emoji-btn.selected{border-color:var(--accent);background:var(--accent-dim);}
  .tp-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:16px;}
  .tp-panel h3{font-size:13.5px;margin-bottom:14px;font-family:'Sora',sans-serif;}

  .tp-empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 20px;}
  .tp-toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface-2);
    border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:50;
  }
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:4px;}

  /* ---------- Nickname colors (premium cosmetic) ---------- */
  .tp-name-rainbow{
    background:linear-gradient(90deg,#FF5C5C,#FFC24B,#4BFF9F,#4BD1FF,#B36BFF,#FF5C5C);
    background-size:300% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:tp-rainbow-move 4s linear infinite;font-weight:800;
  }
  @keyframes tp-rainbow-move{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
  .tp-name-gold{color:var(--gold);font-weight:800;}
  .tp-name-cyan{color:#4BD1FF;font-weight:800;}
  .tp-name-pink{color:#FF6BD6;font-weight:800;}
  .tp-name-green{color:#4BFF9F;font-weight:800;}

  /* ---------- TELEpost Premium membership perks ---------- */
  .tp-premium-panel{
    background:linear-gradient(135deg, rgba(232,163,61,0.10), rgba(0,209,178,0.06));
    border:1px solid var(--gold-dim);
  }
  .tp-premium-badge{
    display:inline-flex;align-items:center;gap:4px;background:var(--gold-dim);color:var(--gold);
    padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:800;margin-left:8px;vertical-align:middle;
  }
  .tp-benefit-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;font-size:12.5px;color:var(--text);line-height:1.5;}
  .tp-benefit-row .ic{font-size:16px;flex-shrink:0;}
  .tp-benefit-row b{display:block;font-size:13px;margin-bottom:1px;}
  .tp-benefit-row span.d{color:var(--muted);}

  /* Avatar frames */
  .tp-avatar-frame{position:relative;display:inline-flex;}
  .tp-avatar-frame.frame-pulse .tp-profile-avatar, .tp-avatar-frame.frame-pulse .tp-avatar{
    animation:tp-frame-pulse 1.6s ease-in-out infinite;
  }
  @keyframes tp-frame-pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,209,178,.55);}50%{box-shadow:0 0 0 6px rgba(0,209,178,0);}}
  .tp-avatar-frame.frame-spin::before{
    content:'';position:absolute;inset:-4px;border-radius:50%;
    background:conic-gradient(from 0deg, #FF5C5C,#FFC24B,#4BFF9F,#4BD1FF,#B36BFF,#FF5C5C);
    animation:tp-frame-spin 3s linear infinite;z-index:0;
  }
  .tp-avatar-frame.frame-spin .tp-profile-avatar, .tp-avatar-frame.frame-spin .tp-avatar{position:relative;z-index:1;}
  @keyframes tp-frame-spin{100%{transform:rotate(360deg);}}
  .tp-avatar-frame.frame-gold::before{
    content:'';position:absolute;inset:-4px;border-radius:50%;
    border:3px solid var(--gold);box-shadow:0 0 12px rgba(232,163,61,.6);z-index:0;
  }
  .tp-avatar-frame.frame-gold .tp-profile-avatar, .tp-avatar-frame.frame-gold .tp-avatar{position:relative;z-index:1;}
  .tp-frame-swatch{width:44px;height:44px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:16px;}

  /* Status badge (emoji + short text next to name) */
  .tp-status-badge{
    display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);
    background:var(--surface-2);padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;
  }

  /* Reactions */
  .tp-reactions-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;align-items:center;}
  .tp-reaction-chip{
    display:inline-flex;align-items:center;gap:3px;background:var(--surface-2);border:1px solid var(--border);
    border-radius:12px;padding:2px 7px;font-size:11.5px;cursor:pointer;font-family:inherit;color:var(--text);
  }
  .tp-reaction-chip.mine{border-color:var(--accent);background:var(--accent-dim);}
  .tp-reaction-add{
    background:transparent;border:1px dashed var(--border);color:var(--muted);border-radius:12px;
    padding:2px 8px;font-size:11px;cursor:pointer;font-family:inherit;
  }
  .tp-reaction-picker{
    position:absolute;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;
    padding:8px;display:flex;flex-wrap:wrap;gap:6px;max-width:220px;box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:20;
  }
  .tp-reaction-picker button{
    background:transparent;border:none;font-size:17px;cursor:pointer;padding:3px;border-radius:6px;
  }
  .tp-reaction-picker button:hover{background:var(--surface);}
  .tp-reaction-picker button.locked{opacity:.35;cursor:not-allowed;}
  .tp-reaction-picker .lbl{width:100%;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:2px 0;}
  .tp-sticker-anim{display:inline-block;animation:tp-sticker-bounce 1.1s ease-in-out infinite;}
  @keyframes tp-sticker-bounce{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-3px) scale(1.15);}}

  /* ---------- News feed ---------- */
  .tp-feed-toolbar{
    width:100%;max-width:560px;display:flex;gap:8px;margin-bottom:2px;flex-wrap:wrap;
  }
  .tp-feed-toggle{
    display:flex;background:var(--surface-2);border-radius:9px;padding:3px;border:1px solid var(--border);
  }
  .tp-feed-toggle button{
    border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;padding:6px 12px;
    border-radius:7px;cursor:pointer;font-family:inherit;
  }
  .tp-feed-toggle button.active{background:var(--accent);color:#04211C;}

  .tp-post-media{width:100%;border-radius:12px;margin:10px 0;overflow:hidden;background:#000;display:flex;justify-content:center;}
  .tp-post-media img{width:100%;max-height:420px;object-fit:cover;display:block;}
  .tp-post-media video{max-width:100%;max-height:480px;display:block;}

  .tp-post-actions{display:flex;align-items:center;gap:14px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
  .tp-post-action-btn{
    background:transparent;border:none;color:var(--muted);font-size:12.5px;font-weight:600;cursor:pointer;
    font-family:inherit;display:flex;align-items:center;gap:5px;
  }
  .tp-post-action-btn:hover{color:var(--text);}
  .tp-post-action-btn.liked{color:var(--accent);}

  .tp-comments-box{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
  .tp-comment{display:flex;gap:8px;margin-bottom:8px;font-size:12.5px;}
  .tp-comment b{font-weight:700;margin-right:4px;}
  .tp-comment-input-row{display:flex;gap:8px;margin-top:8px;}
  .tp-comment-input-row input{
    flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;
    padding:8px 14px;color:var(--text);font-family:inherit;font-size:12.5px;outline:none;
  }
  .tp-comment-send{background:var(--accent);color:#04211C;border:none;border-radius:20px;padding:0 14px;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px;}

  .tp-media-input-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
  .tp-media-btn{
    background:var(--surface-2);border:1px solid var(--border);color:var(--muted);border-radius:8px;
    padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
  }
  .tp-media-preview{position:relative;margin-bottom:12px;}
  .tp-media-preview img{max-width:100%;max-height:200px;border-radius:10px;display:block;}
  .tp-media-remove{
    position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.7);color:#fff;border:none;
    border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:13px;
  }

  /* ---------- Search / groups / notifications / voice ---------- */
  .tp-search-box{padding:10px 12px;border-bottom:1px solid var(--border);}
  .tp-search-box input{
    width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
    padding:8px 10px;color:var(--text);font-family:inherit;font-size:12.5px;outline:none;
  }
  .tp-search-results{max-height:160px;overflow-y:auto;}
  .tp-search-result-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;font-size:12.5px;}
  .tp-search-result-item button{
    background:var(--accent);color:#04211C;border:none;border-radius:8px;padding:5px 10px;
    font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .tp-group-composer{padding:12px;border-bottom:1px solid var(--border);background:var(--surface-2);}
  .tp-group-composer input[type=text]{
    width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:8px 10px;color:var(--text);font-family:inherit;font-size:12.5px;outline:none;margin-bottom:8px;
  }
  .tp-group-member-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);padding:3px 0;}
  .tp-new-group-btn{
    width:100%;background:transparent;border:1px dashed var(--border);color:var(--muted);
    border-radius:10px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin:8px 12px;width:calc(100% - 24px);
  }
  .tp-new-group-btn:hover{color:var(--text);border-color:var(--accent);}

  .tp-notif-bell{position:relative;}
  .tp-notif-dot{
    position:absolute;top:-3px;right:-3px;background:var(--danger);color:#fff;font-size:9.5px;font-weight:800;
    border-radius:10px;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;
  }
  .tp-notif-dropdown{
    position:absolute;top:44px;right:16px;width:300px;max-height:360px;overflow-y:auto;background:var(--surface);
    border:1px solid var(--border);border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.5);z-index:40;
  }
  .tp-notif-item{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12.5px;line-height:1.4;}

    padding:0 14px;font-size:15px;cursor:pointer;font-family:inherit;

  .tp-voice-msg{display:flex;align-items:center;gap:8px;}
  .tp-voice-msg audio{height:32px;max-width:190px;}
</style>

<div id="tp-root"></div>

<script>
(function(){
  const root = document.getElementById('tp-root');

  const state = {
    view: 'auth',
    authMode: 'login',
    username: null,
    coins: 0,
    avatar: '🙂',
    nameColor: 'default',
    isPremium: false,
    avatarFrame: 'none',
    statusEmoji: '',
    statusText: '',
    reactionPickerFor: null, // ts of message currently showing the reaction picker
    error: '',
    loading: false,
    tab: 'chats',
    activeRoom: 'global',
    posts: [],
    unlocked: [],
    messages: [],
    friends: [],
    toast: null,
    addFriendMsg: '',
    profileMsg: '',
    pendingCode: '',
    pendingUsername: '',
    pendingPassword: '',
    pendingUserObj: null,
    showCodeLogin: false,
    myCode: '',
    showComposer: false,
    composerPremium: true,
    composerImage: null,
    composerVideoUrl: '',
    feedFilter: 'all', // all | friends
    feedSort: 'new', // new | popular
    expandedComments: {},
    userDirectory: [],
    friendSearchQuery: '',
    groups: [],
    showGroupComposer: false,
    groupComposerMembers: [],
    isRecording: false,
    notifications: [],
    notifOpen: false,
    notifPermission: (typeof Notification !== 'undefined' ? Notification.permission : 'unsupported'),
  };

  const SEED_POSTS = [
    {id:'p1', author:'Анна Кодер', meta:'IT-канал · 2 ч назад', premium:false, price:0,
      text:'Сегодня разобрали, как устроен event loop в JS. Свободный пост — читайте на здоровье!'},
    {id:'p2', author:'Анна Кодер', meta:'IT-канал · вчера', premium:true, price:300,
      text:'Полный разбор системного дизайна: как я прошла собеседование в топ-компанию. Пошаговый план подготовки, вопросы, которые задавали, и мои реальные ответы с разбором ошибок.'},
    {id:'p3', author:'Марат Финанс', meta:'Деньги и рынки · сегодня', premium:true, price:300,
      text:'Мой личный портфель на этот квартал: какие активы держу, почему вышел из двух позиций на прошлой неделе и что покупаю дальше. Подробные цифры внутри.'},
    {id:'p4', author:'Марат Финанс', meta:'Деньги и рынки · 3 дня назад', premium:false, price:0,
      text:'Короткий разбор новостей по ставке ЦБ — бесплатно для всех подписчиков.'},
    {id:'p5', author:'Лина Дизайн', meta:'UI/UX журнал · сегодня', premium:true, price:300,
      text:'Мой файл в Figma с 40 готовыми компонентами для мобильных приложений + видео, как я их собирала.'},
  ];

  const EMOJI_CHOICES = ['🙂','😎','🚀','🔥','🌟','🐱','🐼','🦊','🎯','🎨','⚡','🌙'];
  const NAME_COLOR_CHOICES = [
    {key:'default', label:'Обычный', swatch:'linear-gradient(135deg,#8793AD,#8793AD)'},
    {key:'rainbow', label:'Радужный', swatch:'linear-gradient(90deg,#FF5C5C,#FFC24B,#4BFF9F,#4BD1FF,#B36BFF)'},
    {key:'gold', label:'Золотой', swatch:'linear-gradient(135deg,#E8A33D,#E8A33D)'},
    {key:'cyan', label:'Голубой', swatch:'linear-gradient(135deg,#4BD1FF,#4BD1FF)'},
    {key:'pink', label:'Розовый', swatch:'linear-gradient(135deg,#FF6BD6,#FF6BD6)'},
    {key:'green', label:'Зелёный', swatch:'linear-gradient(135deg,#4BFF9F,#4BFF9F)'},
  ];
  function nameColorClass(color){
    return color && color !== 'default' ? 'tp-name-' + color : '';
  }
  const PREMIUM_PRICE = 500;
  const AVATAR_FRAMES = [
    {key:'none', label:'Без рамки'},
    {key:'pulse', label:'Пульс'},
    {key:'spin', label:'Радужная рамка'},
    {key:'gold', label:'Золотая рамка'},
  ];
  const STATUS_EMOJI_CHOICES = ['🔥','🎮','😴','🎧','💼','📚','✈️','☕','🎨','🚀','💎','🌙'];
  const FREE_REACTIONS = ['👍','❤️','😂'];
  const PREMIUM_REACTIONS = ['🔥','🎉','💯','🥳','✨','🚀'];
  const GLOBAL_CHAT_KEY = 'global-chat-messages';
  let chatPollTimer = null;
  let lastMessagesSignature = '';

  const memoryStore = {};
  function memKey(key, shared){ return (shared ? 'S:' : 'P:') + key; }
  function withTimeout(promise, ms){
    return Promise.race([
      promise,
      new Promise((_, reject)=>setTimeout(()=>reject(new Error('timeout')), ms))
    ]);
  }
  async function sSet(key, value, shared){
    memoryStore[memKey(key, shared)] = value;
    for(let attempt=0; attempt<4; attempt++){
      try{
        if(window.storage){
          await withTimeout(window.storage.set(key, value, shared), 3000 + attempt*1500);
          return { key, value, shared };
        }
      }catch(e){ /* retry */ }
    }
    return { key, value, shared };
  }
  async function sGet(key, shared){
    for(let attempt=0; attempt<3; attempt++){
      try{
        if(window.storage){
          const res = await withTimeout(window.storage.get(key, shared), 3000 + attempt*1500);
          if(res){ memoryStore[memKey(key, shared)] = res.value; return res; }
        }
      }catch(e){ /* try again / fall through */ }
    }
    const mk = memKey(key, shared);
    if(mk in memoryStore) return { key, value: memoryStore[mk], shared };
    throw new Error('not-found');
  }

  function uid(){return state.username;}
  function sanitizeUsername(s){
    return s.trim().replace(/[\s\/\\'"]/g, '').toLowerCase();
  }
  function toast(msg){
    state.toast = msg;
    render();
    setTimeout(()=>{ state.toast=null; render(); }, 2400);
  }

  async function ensurePostsSeeded(){
    try{
      const res = await sGet('posts', true);
      state.posts = JSON.parse(res.value);
    }catch(e){
      try{
        await sSet('posts', JSON.stringify(SEED_POSTS), true);
        state.posts = SEED_POSTS;
      }catch(e2){ state.posts = SEED_POSTS; }
    }
  }

  async function loadUnlocked(){
    try{
      const res = await sGet('unlocked:'+uid(), true);
      state.unlocked = JSON.parse(res.value);
    }catch(e){ state.unlocked = []; }
  }

  async function loadFriends(){
    try{
      const res = await sGet('friends:'+uid(), true);
      state.friends = JSON.parse(res.value);
    }catch(e){ state.friends = []; }
  }

  // ---------- User directory (for searching people to add) ----------
  async function registerToDirectory(username){
    let dir = [];
    try{ const res = await sGet('user-directory', true); dir = JSON.parse(res.value); }catch(e){ dir = []; }
    if(!dir.includes(username)){
      dir.push(username);
      try{ await sSet('user-directory', JSON.stringify(dir), true); }catch(e){}
    }
  }
  async function loadUserDirectory(){
    try{
      const res = await sGet('user-directory', true);
      state.userDirectory = JSON.parse(res.value);
    }catch(e){ state.userDirectory = []; }
  }

  // ---------- Groups ----------
  async function loadGroups(){
    let ids = [];
    try{ const res = await sGet('mygroups:'+uid(), true); ids = JSON.parse(res.value); }catch(e){ ids = []; }
    const groups = [];
    for(const id of ids){
      try{
        const res = await sGet('group-meta:'+id, true);
        groups.push(JSON.parse(res.value));
      }catch(e){ /* skip missing group */ }
    }
    state.groups = groups;
  }

  async function createGroup(name, memberUsernames){
    const cleanName = (name || '').trim();
    if(!cleanName){ toast('Введите название группы'); return; }
    const members = Array.from(new Set([state.username, ...memberUsernames]));
    if(members.length < 2){ toast('Выберите хотя бы одного друга для группы'); return; }
    const id = 'g' + Date.now();
    const meta = { id, name: cleanName, members, owner: state.username };
    try{ await sSet('group-meta:'+id, JSON.stringify(meta), true); }catch(e){}
    for(const member of members){
      let ids = [];
      try{ const res = await sGet('mygroups:'+member, true); ids = JSON.parse(res.value); }catch(e){ ids = []; }
      if(!ids.includes(id)){
        ids.push(id);
        try{ await sSet('mygroups:'+member, JSON.stringify(ids), true); }catch(e){}
      }
    }
    state.groups.push(meta);
    state.showGroupComposer = false;
    state.groupComposerMembers = [];
    toast('Группа «' + cleanName + '» создана ✅');
    await switchRoom('group:'+id);
  }

  function dmKey(a,b){ return 'dm:' + [a,b].sort().join('__'); }
  function currentRoomKey(){
    if(state.activeRoom === 'global') return GLOBAL_CHAT_KEY;
    if(typeof state.activeRoom === 'string' && state.activeRoom.startsWith('group:')){
      return 'group-chat:' + state.activeRoom.slice(6);
    }
    return dmKey(state.username, state.activeRoom);
  }
  function currentGroupMeta(){
    if(typeof state.activeRoom !== 'string' || !state.activeRoom.startsWith('group:')) return null;
    const id = state.activeRoom.slice(6);
    return state.groups.find(g => g.id === id) || null;
  }

  async function loadRoomMessages(){
    const key = currentRoomKey();
    try{
      const res = await sGet(key, true);
      state.messages = JSON.parse(res.value);
    }catch(e){
      state.messages = state.activeRoom === 'global'
        ? [{user:'TELEpost', text:'Добро пожаловать в общий чат TELEpost! Здесь видят все.', ts:Date.now()}]
        : [];
      try{ await sSet(key, JSON.stringify(state.messages), true); }catch(e2){}
    }
    lastMessagesSignature = JSON.stringify(state.messages);
  }

  async function pollRoomMessages(){
    const key = currentRoomKey();
    try{
      const res = await sGet(key, true);
      const fresh = JSON.parse(res.value);
      const sig = JSON.stringify(fresh);
      if(sig !== lastMessagesSignature){
        lastMessagesSignature = sig;
        state.messages = fresh;
        if(state.view==='app' && state.tab==='chats'){
          const msgBox = document.getElementById('tp-messages');
          if(msgBox){
            const wasAtBottom = msgBox.scrollTop + msgBox.clientHeight >= msgBox.scrollHeight - 40;
            msgBox.innerHTML = '';
            state.messages.forEach(m=>msgBox.appendChild(renderMsgBubble(m)));
            if(wasAtBottom) msgBox.scrollTop = msgBox.scrollHeight;
          }
        }
      }
    }catch(e){ /* ignore transient poll errors */ }
  }

  function startChatPolling(){
    stopChatPolling();
    chatPollTimer = setInterval(pollRoomMessages, 2200);
  }
  function stopChatPolling(){
    if(chatPollTimer){ clearInterval(chatPollTimer); chatPollTimer = null; }
  }

  async function switchRoom(roomId){
    state.activeRoom = roomId;
    state.messages = [];
    render();
    await loadRoomMessages();
    render();
    startChatPolling();
  }

  async function saveUser(overrides){
    const base = {
      password: cachedPassword,
      coins: state.coins,
      avatar: state.avatar,
      nameColor: state.nameColor,
      isPremium: state.isPremium,
      avatarFrame: state.avatarFrame,
      statusEmoji: state.statusEmoji,
      statusText: state.statusText,
    };
    const userObj = Object.assign(base, overrides || {});
    if(!userObj.password){ userObj.password = await getPassword(); }
    await sSet('user:'+state.username, JSON.stringify(userObj), true);
  }

  function makeRecoveryCode(username, password){
    try{ return btoa(unescape(encodeURIComponent(username + '::' + password))); }
    catch(e){ return ''; }
  }
  function parseRecoveryCode(code){
    try{
      const decoded = decodeURIComponent(escape(atob(code.trim())));
      const idx = decoded.indexOf('::');
      if(idx < 0) return null;
      return { username: decoded.slice(0, idx), password: decoded.slice(idx+2) };
    }catch(e){ return null; }
  }

  async function finishLogin(username, password, userObj){
    state.username = username; state.coins = userObj.coins; state.avatar = userObj.avatar || '🙂';
    state.nameColor = userObj.nameColor || 'default';
    state.isPremium = !!userObj.isPremium;
    state.avatarFrame = userObj.avatarFrame || 'none';
    state.statusEmoji = userObj.statusEmoji || '';
    state.statusText = userObj.statusText || '';
    cachedPassword = password;
    state.myCode = makeRecoveryCode(username, password);
    await registerToDirectory(username);
    await ensurePostsSeeded();
    await loadUnlocked();
    await loadFriends();
    await loadUserDirectory();
    await loadGroups();
    await loadNotifications();
    state.activeRoom = 'global';
    await loadRoomMessages();
    state.view = 'app'; state.loading = false;
    render();
    startChatPolling();
    startNotifPolling();
  }

  async function handleAuthSubmit(rawUsername, password){
    state.error = '';
    if(!rawUsername || !password){ state.error = 'Заполните имя пользователя и пароль'; render(); return; }
    const username = sanitizeUsername(rawUsername);
    if(username.length < 3){ state.error = 'Имя пользователя — минимум 3 символа, без пробелов'; render(); return; }
    if(password.length < 3){ state.error = 'Пароль — минимум 3 символа'; render(); return; }
    state.loading = true; render();
    try{
      if(state.authMode === 'register'){
        let exists = null;
        try{ exists = await sGet('user:'+username, true); }catch(e){ exists = null; }
        if(exists){ state.error = 'Такой пользователь уже существует, попробуйте войти'; state.loading=false; render(); return; }
        const userObj = { password, coins: 350, avatar: EMOJI_CHOICES[Math.floor(Math.random()*EMOJI_CHOICES.length)], nameColor: 'default' };
        await sSet('user:'+username, JSON.stringify(userObj), true);
        state.pendingCode = makeRecoveryCode(username, password);
        state.pendingUsername = username;
        state.pendingPassword = password;
        state.pendingUserObj = userObj;
        state.loading = false;
        state.view = 'save_code';
        render();
        return;
      } else {
        let res;
        try{ res = await sGet('user:'+username, true); }
        catch(e){
          state.error = 'Аккаунт не найден в хранилище. Если у вас есть код входа из настроек, воспользуйтесь кнопкой «Войти по коду» ниже.';
          state.loading=false; render(); return;
        }
        const userObj = JSON.parse(res.value);
        if(userObj.password !== password){ state.error = 'Неверный пароль'; state.loading=false; render(); return; }
        await finishLogin(username, password, userObj);
      }
    }catch(e){
      state.error = 'Ошибка хранилища: ' + (e && e.message ? e.message : 'попробуйте ещё раз');
      state.loading = false;
      render();
    }
  }

  // Logging in with a saved recovery code never depends on the account
  // record being found in storage first — it trusts the code, restores
  // whatever data it can find, and re-saves the account so future logins
  // (with or without the code) have the best chance of working.
  async function loginWithCode(rawCode){
    state.error = '';
    const parsed = parseRecoveryCode(rawCode);
    if(!parsed || !parsed.username || !parsed.password){
      state.error = 'Код входа не распознан. Проверьте, что вы скопировали его полностью.';
      render(); return;
    }
    state.loading = true; render();
    const { username, password } = parsed;
    let userObj = { password, coins: 350, avatar: EMOJI_CHOICES[0], nameColor: 'default' };
    try{
      const res = await sGet('user:'+username, true);
      const stored = JSON.parse(res.value);
      if(stored && stored.password === password) userObj = stored;
    }catch(e){ /* nothing stored yet — we'll recreate it below */ }
    try{
      await sSet('user:'+username, JSON.stringify(userObj), true);
      await finishLogin(username, password, userObj);
    }catch(e){
      state.error = 'Не удалось войти по коду, попробуйте ещё раз';
      state.loading = false; render();
    }
  }

  function logout(){
    stopChatPolling();
    stopNotifPolling();
    state.view='auth'; state.username=null; state.coins=0; state.error='';
    state.authMode='login'; state.friends=[]; state.messages=[]; state.activeRoom='global';
    state.groups = []; state.notifications = []; state.notifOpen = false; state.userDirectory = [];
    cachedPassword = null;
    render();
  }

  // ---------- Voice messages ----------
  let mediaRecorder = null;
  let recordedChunks = [];
  let recordingStopTimer = null;

  async function startRecording(){
    if(state.isRecording) return;
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      toast('Микрофон недоступен в этом браузере'); return;
    }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recordedChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = (e)=>{ if(e.data && e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = async ()=>{
        stream.getTracks().forEach(t=>t.stop());
        state.isRecording = false;
        render();
        if(!recordedChunks.length) return;
        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
        if(blob.size > 900000){ toast('Голосовое слишком длинное, запишите покороче'); return; }
        const reader = new FileReader();
        reader.onload = ()=>{ sendMessage('', reader.result); };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start();
      state.isRecording = true;
      render();
      // Auto-stop after 30s so recordings stay small enough to store.
      recordingStopTimer = setTimeout(()=> stopRecording(), 30000);
    }catch(e){
      toast('Не удалось получить доступ к микрофону');
    }
  }

  function stopRecording(){
    if(recordingStopTimer){ clearTimeout(recordingStopTimer); recordingStopTimer = null; }
    if(mediaRecorder && state.isRecording){ mediaRecorder.stop(); }
  }

  async function sendMessage(text, audioDataUrl){
    const cleanText = (text || '').trim();
    if(!cleanText && !audioDataUrl) return;
    const key = currentRoomKey();
    const msg = {
      user: state.username, text: cleanText, ts: Date.now(), color: state.nameColor,
      statusEmoji: state.isPremium ? state.statusEmoji : '', reactions: {},
      audio: audioDataUrl || null,
    };
    state.messages.push(msg);
    lastMessagesSignature = JSON.stringify(state.messages);
    render();
    try{
      let latest = state.messages;
      try{
        const res = await sGet(key, true);
        latest = JSON.parse(res.value);
      }catch(e){ /* use local state.messages if nothing stored yet */ }
      latest.push(msg);
      await sSet(key, JSON.stringify(latest), true);
      state.messages = latest;
      lastMessagesSignature = JSON.stringify(latest);
    }catch(e){ /* message still shows locally even if sync failed */ }

    // Notify recipients (friend in a DM, or every other member of a group)
    const preview = audioDataUrl ? '🎤 голосовое сообщение' : cleanText.slice(0, 60);
    if(state.activeRoom !== 'global'){
      if(typeof state.activeRoom === 'string' && state.activeRoom.startsWith('group:')){
        const meta = currentGroupMeta();
        if(meta){
          meta.members.filter(m => m !== state.username).forEach(m=>{
            pushNotification(m, { type:'group', text: `${state.username} в «${meta.name}»: ${preview}`, room: state.activeRoom });
          });
        }
      }else{
        pushNotification(state.activeRoom, { type:'dm', text: `${state.username}: ${preview}`, room: state.username });
      }
    }
  }

  async function addFriend(rawName){
    const name = sanitizeUsername(rawName || '');
    if(!name){ state.addFriendMsg = 'Введите имя пользователя'; render(); return; }
    if(name === state.username){ state.addFriendMsg = 'Это ваш собственный аккаунт 🙂'; render(); return; }
    if(state.friends.includes(name)){
      state.addFriendMsg = '';
      await switchRoom(name);
      return;
    }
    state.addFriendMsg = 'Ищем пользователя…'; render();
    let exists;
    try{ exists = await sGet('user:'+name, true); }
    catch(e){ state.addFriendMsg = 'Пользователь с таким именем не найден'; render(); return; }
    state.friends.push(name);
    await sSet('friends:'+state.username, JSON.stringify(state.friends), true);
    try{
      const fres = await sGet('friends:'+name, true);
      const theirFriends = JSON.parse(fres.value);
      if(!theirFriends.includes(state.username)){
        theirFriends.push(state.username);
        await sSet('friends:'+name, JSON.stringify(theirFriends), true);
      }
    }catch(e){
      await sSet('friends:'+name, JSON.stringify([state.username]), true);
    }
    state.addFriendMsg = 'Друг добавлен ✅';
    toast('Теперь вы можете переписываться с ' + name);
    await switchRoom(name);
  }

  async function buyPost(post){
    if(state.coins < post.price){ toast('Недостаточно монет 💎'); return; }
    state.coins -= post.price;
    state.unlocked.push(post.id);
    render();
    try{
      await saveUser();
      await sSet('unlocked:'+uid(), JSON.stringify(state.unlocked), true);
      toast('Пост разблокирован ✅');
    }catch(e){
      toast('Ошибка сохранения покупки');
    }
  }

  // Lets any logged-in user publish their own post into the shared feed.
  // We re-fetch the latest post list right before writing so we don't
  // clobber posts someone else published in the meantime.
  async function createPost(text, isPremium, price, image, videoUrl){
    const cleanText = (text || '').trim();
    if(!cleanText && !image && !videoUrl){ toast('Добавьте текст, фото или видео'); return; }
    const cleanPrice = isPremium ? Math.max(1, parseInt(price, 10) || 300) : 0;
    const post = {
      id: 'u-' + state.username + '-' + Date.now(),
      author: state.username,
      authorColor: state.nameColor,
      authorStatusEmoji: state.isPremium ? state.statusEmoji : '',
      meta: 'от вас · только что',
      premium: !!isPremium,
      price: cleanPrice,
      text: cleanText,
      image: image || null,
      videoUrl: (videoUrl || '').trim() || null,
      reactions: {},
      comments: [],
      shares: 0,
      ts: Date.now(),
    };
    let latest = state.posts;
    try{
      const res = await sGet('posts', true);
      latest = JSON.parse(res.value);
    }catch(e){ /* use local state.posts if nothing stored yet */ }
    latest.unshift(post); // newest first
    state.posts = latest;
    // Authors automatically get access to their own premium posts.
    if(post.premium && !state.unlocked.includes(post.id)){
      state.unlocked.push(post.id);
      try{ await sSet('unlocked:'+uid(), JSON.stringify(state.unlocked), true); }catch(e){}
    }
    try{
      await sSet('posts', JSON.stringify(latest), true);
      toast(post.premium ? 'Premium-пост опубликован ✅' : 'Пост опубликован ✅');
    }catch(e){
      toast('Пост показан, но не удалось сохранить в общей ленте');
    }
    render();
  }

  // Toggles the current user's reaction on a post (mirrors toggleReaction for chat messages).
  async function togglePostReaction(postId, emoji, isPremiumSticker){
    if(isPremiumSticker && !state.isPremium){
      toast('Эта анимированная наклейка доступна только с TELEpost Premium ⭐');
      return;
    }
    let latest = state.posts;
    try{
      const res = await sGet('posts', true);
      latest = JSON.parse(res.value);
    }catch(e){ /* fall back to local copy */ }
    const post = latest.find(p => p.id === postId);
    if(!post){ render(); return; }
    if(!post.reactions) post.reactions = {};
    if(!post.reactions[emoji]) post.reactions[emoji] = [];
    const idx = post.reactions[emoji].indexOf(state.username);
    if(idx >= 0) post.reactions[emoji].splice(idx, 1);
    else post.reactions[emoji].push(state.username);
    if(post.reactions[emoji].length === 0) delete post.reactions[emoji];
    state.posts = latest;
    render();
    try{ await sSet('posts', JSON.stringify(latest), true); }catch(e){}
    if(idx < 0 && post.author !== state.username){
      pushNotification(post.author, { type:'like', text: `${state.username} отреагировал(а) ${emoji} на ваш пост`, room: null });
    }
  }

  // ---------- Notifications ----------
  // Appends a notification to the recipient's own notification list in
  // shared storage. Re-fetches first so we don't clobber concurrent writes.
  async function pushNotification(recipient, notif){
    if(!recipient || recipient === state.username) return;
    let latest = [];
    try{
      const res = await sGet('notifications:'+recipient, true);
      latest = JSON.parse(res.value);
    }catch(e){ latest = []; }
    latest.unshift(Object.assign({ ts: Date.now(), read: false }, notif));
    latest = latest.slice(0, 50); // keep it bounded
    try{ await sSet('notifications:'+recipient, JSON.stringify(latest), true); }catch(e){}
  }

  let notifPollTimer = null;
  let lastNotifSignature = '';
  async function pollNotifications(){
    try{
      const res = await sGet('notifications:'+uid(), true);
      const fresh = JSON.parse(res.value);
      const sig = JSON.stringify(fresh);
      if(sig !== lastNotifSignature){
        const hadUnreadBefore = state.notifications.filter(n=>!n.read).length;
        const newOnes = fresh.filter(n => !n.read && !state.notifications.some(o => o.ts === n.ts && o.text === n.text));
        lastNotifSignature = sig;
        state.notifications = fresh;
        if(newOnes.length && document.hidden === false){ /* tab visible, in-app badge is enough */ }
        if(newOnes.length && state.notifPermission === 'granted' && typeof Notification !== 'undefined'){
          newOnes.slice(0,3).forEach(n=>{
            try{ new Notification('TELEpost', { body: n.text }); }catch(e){}
          });
        }
        render();
      }
    }catch(e){ /* ignore transient poll errors */ }
  }
  function startNotifPolling(){
    stopNotifPolling();
    notifPollTimer = setInterval(pollNotifications, 4000);
  }
  function stopNotifPolling(){
    if(notifPollTimer){ clearInterval(notifPollTimer); notifPollTimer = null; }
  }

  // Resizes/compresses an image client-side before storing it as base64,
  // since the whole 'posts' list shares one storage value with a size limit.
  function readImageCompressed(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onerror = ()=> reject(new Error('read-failed'));
      reader.onload = ()=>{
        const img = new Image();
        img.onerror = ()=> reject(new Error('decode-failed'));
        img.onload = ()=>{
          const maxW = 900;
          const scale = Math.min(1, maxW / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  async function changePassword(current, next, confirm){
    state.profileMsg = '';
    if(!current || !next || !confirm){ state.profileMsg = 'err:Заполните все поля'; render(); return; }
    const realPassword = await getPassword();
    if(current !== realPassword){ state.profileMsg = 'err:Текущий пароль неверный'; render(); return; }
    if(next.length < 3){ state.profileMsg = 'err:Новый пароль — минимум 3 символа'; render(); return; }
    if(next !== confirm){ state.profileMsg = 'err:Пароли не совпадают'; render(); return; }
    try{
      cachedPassword = next;
      await saveUser({ password: next });
      state.myCode = makeRecoveryCode(state.username, next);
      state.profileMsg = 'ok:Пароль обновлён ✅ Новый код входа показан ниже — сохраните его.';
    }catch(e){
      state.profileMsg = 'err:Не удалось сохранить, попробуйте ещё раз';
    }
    render();
  }

      const row = document.createElement('div');

      row.appendChild(addBtn);
      d.appendChild(row);
    }

    if(state.reactionPickerFor === m.ts){
      const picker = document.createElement('div');
      picker.className = 'tp-reaction-picker';
      picker.style.top = '100%';
      picker.style[mine ? 'right' : 'left'] = '0';
      let html = '<div class="lbl">Обычные</div>';
      FREE_REACTIONS.forEach(e => html += `<button data-emoji="${e}" data-sticker="0">${e}</button>`);
      html += '<div class="lbl">⭐ Premium-стикеры</div>';
      PREMIUM_REACTIONS.forEach(e => html += `<button data-emoji="${e}" data-sticker="1" class="${state.isPremium ? 'tp-sticker-anim' : 'locked'}">${e}</button>`);
      picker.innerHTML = html;
      picker.querySelectorAll('button').forEach(btn=>{
        btn.addEventListener('click', (e)=>{
          e.stopPropagation();
          toggleReaction(m.ts, btn.dataset.emoji, btn.dataset.sticker === '1');
        });
      });
      d.appendChild(picker);
    }
    return d;
  }

    searchInput.addEventListener('input', ()=>{ state.friendSearchQuery = searchInput.value; render(); });

      });
    });
    const groupCreateBtn = wrap.querySelector('#tp-group-create');
    if(groupCreateBtn){
      groupCreateBtn.addEventListener('click', ()=>{
        const name = wrap.querySelector('#tp-group-name').value;

    const doAddFriend = ()=>{ const v = friendInput.value; friendInput.value=''; addFriend(v); };
    wrap.querySelector('#tp-friend-add').addEventListener('click', doAddFriend);
    friendInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') doAddFriend(); });

    const msgBox = wrap.querySelector('#tp-messages');
    if(state.messages.length){
      state.messages.forEach(m=>msgBox.appendChild(renderMsgBubble(m)));

      msgBox.innerHTML = '<div class="tp-empty">Пока нет сообщений — напишите первым!</div>';
    }
    setTimeout(()=>{ msgBox.scrollTop = msgBox.scrollHeight; }, 0);
    const input = wrap.querySelector('#tp-msg-input');
    const send = ()=>{ const v = input.value; input.value=''; sendMessage(v); };
    wrap.querySelector('#tp-send').addEventListener('click', send);
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') send(); });
    wrap.querySelector('#tp-mic-btn').addEventListener('click', ()=>{
      if(state.isRecording) stopRecording(); else startRecording();
    });
    return wrap;
  }

      renderPreview();

      panel.querySelector('#tp-new-post-image').addEventListener('change', async (e)=>{
        const file = e.target.files && e.target.files[0];
        if(!file) return;

          toast('Обрабатываем фото…');
          state.composerImage = await readImageCompressed(file);
          renderPreview();

        state.showComposer = false; state.composerImage = null; state.composerVideoUrl = ''; render();

            <div class="tp-post-meta">${post.meta}</div>
          </div>
        </div>
        ${post.text ? `<div class="tp-post-text ${isUnlocked?'':'locked'}">${post.text}</div>` : ''}
        ${isUnlocked ? mediaHtml : ''}
        ${post.premium ?

                 <div class="tp-unlock-text">Разблокируйте полный пост за ${post.price} 💎</div>
                 <button class="tp-unlock-btn" data-id="${post.id}" data-price="${post.price}">Купить за ${post.price} 💎</button>
               </div>`)
          : ''}
        ${isUnlocked ? `

        </div>` : ''}
        <div class="tp-post-react-picker" data-picker-for="${post.id}" style="display:none;position:relative;">
          <div class="tp-reaction-picker" style="position:static;display:flex;">
            <div class="lbl">Обычные</div>

        <div class="tp-comments-box" data-comments-for="${post.id}" style="display:${commentsOpen?'block':'none'};">

        </div>

      `;
      wrap.appendChild(card);

    wrap.querySelectorAll('.tp-unlock-btn').forEach(btn=>{

        buyPost(post);

        </div>

        <div class="tp-panel">
          <h3>Цвет ника</h3>
          <div style="color:var(--muted);font-size:12px;margin-bottom:12px;line-height:1.5;">
            Ваше имя будет отображаться этим цветом в чатах и под вашими постами.
          </div>
          <div class="tp-emoji-row">
            ${NAME_COLOR_CHOICES.map(c => `
              <button class="tp-emoji-btn tp-color-btn ${c.key===state.nameColor?'selected':''}" data-color="${c.key}" title="${c.label}"
                style="background:${c.swatch};width:auto;padding:0 12px;height:36px;font-size:12px;font-weight:700;color:${c.key==='default'?'var(--muted)':'#0B0F17'};">
                ${c.label}
              </button>
            `).join('')}
          </div>
        </div>

        <div class="tp-panel">
          <h3>Сменить пароль</h3>
          <div class="tp-field">
            <label>Текущий пароль</label>
            <input type="password" id="tp-pw-current" placeholder="••••••••">
          </div>
          <div class="tp-field">
            <label>Новый пароль</label>
            <input type="password" id="tp-pw-new" placeholder="••••••••">
          </div>
          <div class="tp-field">
            <label>Повторите новый пароль</label>
            <input type="password" id="tp-pw-confirm" placeholder="••••••••">
          </div>
          <button class="tp-btn-primary" id="tp-pw-save">Сохранить пароль</button>
          ${pwMsgHtml}
        </div>

        <div class="tp-panel">
          <h3>Код входа (на случай, если пароль не сработает)</h3>
          <div style="color:var(--muted);font-size:12px;margin-bottom:10px;line-height:1.5;">
            Если при входе появится «пользователь не найден», нажмите «Войти по коду» на экране входа и вставьте этот код — он всегда восстановит доступ к аккаунту.
          </div>
          <textarea id="tp-mycode-box" readonly rows="2" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:12px;font-family:monospace;resize:none;">${state.myCode}</textarea>
          <button class="tp-btn-secondary" id="tp-mycode-copy">Скопировать код</button>
        </div>

        <div class="tp-panel">
          <h3>🔔 Уведомления</h3>
          <div style="color:var(--muted);font-size:12px;margin-bottom:12px;line-height:1.5;">
            Получайте push-уведомления браузера о новых сообщениях, лайках и комментариях, даже если вкладка свёрнута.
          </div>
          ${state.notifPermission === 'granted'
            ? '<div class="tp-success">✓ Уведомления браузера включены</div>'
            : `<button class="tp-btn-secondary" id="tp-enable-notifs">Включить уведомления браузера</button>`}
        </div>

        <div class="tp-panel">
          <h3>Аккаунт</h3>
          <div style="color:var(--muted);font-size:12.5px;line-height:1.6;">
            Ваш аккаунт хранится под именем <b style="color:var(--text)">${state.username}</b> и остаётся сохранённым после выхода — просто войдите снова с тем же именем и паролем.
          </div>
          <button class="tp-btn-secondary" id="tp-profile-logout">Выйти из аккаунта</button>
        </div>
      </div>
    `;

    wrap.querySelectorAll('.tp-emoji-btn[data-emoji]').forEach(btn=>{
      btn.addEventListener('click', ()=> updateAvatar(btn.dataset.emoji));
    });
    const buyPremiumBtn = wrap.querySelector('#tp-buy-premium');
    if(buyPremiumBtn) buyPremiumBtn.addEventListener('click', purchasePremium);
    wrap.querySelectorAll('.tp-frame-btn').forEach(btn=>{
      btn.addEventListener('click', ()=> updateAvatarFrame(btn.dataset.frame));
    });
    let selectedStatusEmoji = state.statusEmoji;
    wrap.querySelectorAll('.tp-status-emoji-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        selectedStatusEmoji = (selectedStatusEmoji === btn.dataset.statusEmoji) ? '' : btn.dataset.statusEmoji;
        wrap.querySelectorAll('.tp-status-emoji-btn').forEach(b=> b.classList.toggle('selected', b.dataset.statusEmoji===selectedStatusEmoji));
      });
    });
    const statusSaveBtn = wrap.querySelector('#tp-status-save');
    if(statusSaveBtn){
      statusSaveBtn.addEventListener('click', ()=>{
        const text = wrap.querySelector('#tp-status-text').value;
        updateStatus(selectedStatusEmoji, text);
      });
    }
    wrap.querySelectorAll('.tp-color-btn').forEach(btn=>{
      btn.addEventListener('click', ()=> updateNameColor(btn.dataset.color));
    });
    wrap.querySelector('#tp-pw-save').addEventListener('click', ()=>{
      const cur = wrap.querySelector('#tp-pw-current').value;
      const next = wrap.querySelector('#tp-pw-new').value;
      const conf = wrap.querySelector('#tp-pw-confirm').value;
      changePassword(cur, next, conf);
    });
    wrap.querySelector('#tp-profile-logout').addEventListener('click', logout);
    const enableNotifsBtn = wrap.querySelector('#tp-enable-notifs');
    if(enableNotifsBtn) enableNotifsBtn.addEventListener('click', requestBrowserNotifications);
    const mycodeCopyBtn = wrap.querySelector('#tp-mycode-copy');
    if(mycodeCopyBtn){
      mycodeCopyBtn.addEventListener('click', async ()=>{
        try{ await navigator.clipboard.writeText(state.myCode); toast('Код скопирован'); }
        catch(e){ wrap.querySelector('#tp-mycode-box').select(); toast('Выделите и скопируйте код вручную'); }
      });
    }
    return wrap;
  }

  render();
})();
</script>
